apiVersion: 1

deleteDatasources:
  - name: AWS Timestream E2E
    orgId: 1

datasources:
  - name: AWS Timestream E2E
    type: grafana-timestream-datasource
    uid: aws-timestream-e2e
    editable: true
    enabled: true
    jsonData:
      authType: keys
      defaultRegion: us-east-2
      defaultDatabase: 'datasources-timestream'
      defaultTable: 'grafana_example_table'
      defaultMeasure: utilisation
    secureJsonData:
      accessKey: $ACCESS_KEY
      secretKey: $SECRET_KEY
    version: 1
